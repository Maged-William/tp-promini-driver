description: TrackPoint over SPI from Pro Mini slave

compatible: "trackpoint,spi"

include: spi-device.yaml

properties:
  report-rate-ms:
    type: int
    default: 10
    description: Polling interval in milliseconds

  swap-xy:
    type: boolean
    description: Swap X and Y axes

  invert-x:
    type: boolean
    description: Invert X axis direction

  invert-y:
    type: boolean
    description: Invert Y axis direction
